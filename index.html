<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRT 機器人資訊門戶 - 登入</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-red: #d32f2f;
            --text-main: #ffffff;
        }

        /* 預設隱藏內容，驗證成功後才顯示 */
        #main-content {
            display: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .portal-container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 15px;
            display: inline-block;
        }

        .portal-item {
            display: block;
            background: var(--card-bg);
            border: 1px solid #333;
            margin-bottom: 25px;
            padding: 25px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .portal-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent-red);
            box-shadow: 0 10px 30px rgba(211, 47, 47, 0.3);
            color: var(--accent-red);
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-top: 8px;
            display: block;
            font-weight: normal;
        }
    </style>
</head>
<body>

<script>
    (function() {
        const secretKey = "509509"; // 您的授權密碼
        // 檢查本次瀏覽是否已經驗證過
        if (sessionStorage.getItem('portal_authorized') !== 'true') {
            let pw = prompt("【FRT 機器人內部系統】\n請輸入授權代碼以進入入口網：");
            if (pw === secretKey) {
                sessionStorage.setItem('portal_authorized', 'true');
                // 驗證成功，顯示內容
                window.onload = function() {
                    document.getElementById('main-content').style.display = 'block';
                };
            } else {
                alert("授權失敗，權限不足。");
                window.location.href = "about:blank"; // 跳轉至空白頁
            }
        } else {
            // 如果已經驗證過，直接顯示
            window.onload = function() {
                document.getElementById('main-content').style.display = 'block';
            };
        }
    })();
</script>

<div id="main-content" class="portal-container">
    <h1>FRT 機器人資訊門戶</h1>

    <a href="repair_tree.html" class="portal-item">
        維修樹狀圖
        <span class="subtitle">故障排除邏輯與架構查詢</span>
    </a>

    <a href="sop_list.html" class="portal-item">
        維修 SOP
        <span class="subtitle">標準作業程序與零件更換圖解</span>
    </a>

    <a href="video_tutorial.html" class="portal-item">
        機器人影音教學
        <span class="subtitle">實體操作演示與維護影片</span>
    </a>
</div>

</body>
</html>

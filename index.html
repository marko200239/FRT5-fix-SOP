<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRT 機器人資訊門戶 - 登入</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-red: #d32f2f;
            --text-main: #ffffff;
        }

        /* 預設隱藏內容 */
        #main-content {
            display: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .portal-container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 15px;
            display: inline-block;
        }

        /* 統一的按鈕樣式 */
        .portal-item {
            display: block;
            background: var(--card-bg);
            border: 1px solid #333;
            margin-bottom: 25px;
            padding: 25px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
            box-sizing: border-box; /* 確保 padding 不會撐破佈局 */
        }

        .portal-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent-red);
            box-shadow: 0 10px 30px rgba(211, 47, 47, 0.3);
            color: var(--accent-red);
        }

        /* 已移除 .trouble-btn 的 border-left 樣式 */

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-top: 8px;
            display: block;
            font-weight: normal;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<script>
    (function() {
        const secretKey = "509509"; // 您的授權密碼
        
        const checkAuth = () => {
            if (sessionStorage.getItem('portal_authorized') === 'true') {
                document.getElementById('main-content').style.display = 'block';
            } else {
                let pw = prompt("【FRT 機器人內部系統】\n請輸入授權代碼以進入入口網：");
                if (pw === secretKey) {
                    sessionStorage.setItem('portal_authorized', 'true');
                    document.getElementById('main-content').style.display = 'block';
                } else {
                    alert("授權失敗，權限不足。");
                    window.location.href = "about:blank"; // 跳轉至空白頁
                }
            }
        };

        // 確保 DOM 載入後執行
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", checkAuth);
        } else {
            checkAuth();
        }
    })();
</script>

<div id="main-content" class="portal-container">
    <h1>FRT 機器人資訊門戶</h1>

    <a href="trouble.html" class="portal-item">
        🔍 故障診斷排除
        <span class="subtitle">依據維修樹狀圖診斷故障原因</span>
    </a>

    <a href="sop_list.html" class="portal-item">
        維修 SOP
        <span class="subtitle">標準作業程序與零件更換圖解</span>
    </a>

    <a href="video_menu.html" class="portal-item">
        機器人影音教學
        <span class="subtitle">實體操作演示與維護影片</span>
    </a>
</div>

</body>
</html>

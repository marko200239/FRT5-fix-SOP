<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCT-5 教學影片庫</title>
    <style>
        :root { 
            --bg: #0a0a0a; 
            --card: #161616; 
            --blue: #00d2ff;
            --text: #ffffff; 
            --sub-text: #888;
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
            margin: 0; 
            padding: 40px 20px;
        }
        .container { 
            max-width: 900px; 
            margin: auto; 
        }
        
        .header { 
            border-left: 5px solid var(--blue); 
            padding-left: 20px; 
            margin-bottom: 40px;
        }
        .header h1 { 
            font-size: 2.2rem; 
            margin: 0; 
            letter-spacing: 2px; 
        }
        .header p { 
            color: var(--sub-text); 
            margin-top: 5px; 
        }

        /* 影片卡片設計 */
        .video-card {
            background: var(--card);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .video-card:hover { 
            border-color: var(--blue); 
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.1); 
        }

        .video-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--blue);
            display: flex;
            align-items: center;
        }

        /* 16:9 YouTube 容器 */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            border: none;
        }

        .video-info {
            margin-top: 15px;
            font-size: 0.95rem;
            color: var(--sub-text);
            line-height: 1.6;
        }

        .footer-nav {
            text-align: center;
            margin-top: 50px;
        }
        .back-btn {
            display: inline-block;
            color: var(--sub-text);
            text-decoration: none;
            padding: 12px 30px;
            border: 1px solid #444;
            border-radius: 6px;
            transition: 0.3s;
        }
        .back-btn:hover { 
            color: #fff; 
            border-color: #fff; 
            background: #222; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PCT-5 教學影音庫</h1>
        <p>高效能導航載具 - 操作教學系列</p>
    </div>

    <div class="video-card">
        <div class="video-title">🎬 PCT-5 介紹</div>
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube-nocookie.com/embed/O7jrM4psc84?rel=0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="no-referrer-when-downgrade"
                allowfullscreen>
            </iframe>
        </div>
        <div class="video-info">詳細說明 PCT-5 的硬體配置、核心功能以及各項感測器安裝位置。</div>
    </div>

    <div class="video-card">
        <div class="video-title">🎬 跟隨模式介紹</div>
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube-nocookie.com/embed/d6GbifftuEg?rel=0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="no-referrer-when-downgrade"
                allowfullscreen>
            </iframe>
        </div>
        <div class="video-info">示範如何開啟自動跟隨功能，並進行現場避障與路徑追蹤測試。</div>
    </div>

    <div class="video-card">
        <div class="video-title">🎬 機器人充電介紹</div>
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube-nocookie.com/embed/0PnES0i8uHI?rel=0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="no-referrer-when-downgrade"
                allowfullscreen>
            </iframe>
        </div>
        <div class="video-info">說明 PCT-5 的正確充電流程、手動/自動回充注意事項與電池維護。</div>
    </div>

    <div class="footer-nav">
        <a href="video_menu.html" class="back-btn">⬅ 返回機型目錄</a>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SOP-03 影像故障排除</title>

<style>
    :root {
        --bg-color: #121212;
        --container-bg: #181818;
        --card-bg: #222222;
        --text-main: #ffffff;
        --text-sub: #b0b0b0;
        --accent: #ff4d4d;
        --blue: #3498db;
        --border: #333333;
    }
    body { 
        font-family: "Microsoft JhengHei", sans-serif; 
        background-color: var(--bg-color); 
        color: var(--text-main); 
        margin: 0; padding: 20px; 
        line-height: 1.6;
    }
    .container, .sop-container, body > div.container, body > div:first-of-type { 
        max-width: 850px; margin: auto; 
        background: var(--container-bg); 
        padding: 30px; border-radius: 12px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        border-top: 8px solid var(--accent);
    }
    h1 { color: var(--text-main); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 15px; }
    h2, h3 { color: var(--blue); border-left: 5px solid var(--blue); padding-left: 12px; margin-top: 30px; }
    .info-card { 
        background: var(--card-bg); 
        border: 1px solid var(--border); 
        padding: 20px; border-radius: 8px; margin-bottom: 20px;
    }
    table { width: 100%; border-collapse: collapse; margin: 15px 0; background: #1a1a1a; }
    th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
    th { background-color: #252525; color: var(--blue); }
    td { color: var(--text-sub); }
    .step { 
        background: #1e1e1e; 
        margin-bottom: 12px; padding: 15px;
        border-radius: 6px; border: 1px solid var(--border); 
        border-left: 5px solid var(--blue);
        color: var(--text-sub);
    }
    .step strong { color: var(--text-main); }
    .back-btn { 
        display: inline-block; margin-top: 30px; color: var(--blue); 
        text-decoration: none; font-weight: bold; 
        border: 1px solid var(--blue); padding: 10px 20px; border-radius: 5px;
    }
    img { max-width: 100%; height: auto; border-radius: 8px; margin: 15px 0; border: 1px solid var(--border); }
</style>

</head>
<body>
    <div class="container">
        <div class="header"><h1>SOP-03：影像故障排除</h1></div>

        <div class="info-card">
            <strong>故障描述：</strong> 平板影像無法觀看影像<br>
            <strong>原因分析：</strong> 頻道未勾選，網路訊號不好<br><br>
            <table>
                <tr><th>項目</th><th>內容</th></tr>
                <tr><td>一般工具</td><td>無</td></tr>
                <tr><td>零組件</td><td>遙控箱、機器人本體</td></tr>
            </table>
        </div>

        <h3>一、頻道勾選與網路訊號檢查</h3>
        <div class="step">
            <strong>1. 頻道檢查：</strong><br>
            觀察 App 有無 ch1~ch3 畫面。若無，請點擊右上角三個點進入頻道勾選。
            <img src="images/sop03_01.jpg">
            <img src="images/sop03_02.jpg">
        </div>
        <div class="step">
            <strong>2. 訊號觀察：</strong><br>
            觀察可見光畫面右上方數值，若數值過低請移動機器人。
            <img src="images/sop03_03.jpg">
        </div>

        <h3>二、燈號狀態判斷</h3>
        <div class="step">
            <strong>指示燈檢查：</strong><br>
            觀察鏡頭有無亮紅燈，或熱顯鏡頭後方指示燈狀態。
            <table>
                <tr><th>LED 指示燈狀態</th><th>說明</th></tr>
                <tr><td>藍燈閃爍</td><td>工作正常</td></tr>
                <tr><td>粉紅色燈穩定亮起</td><td>正在啟動</td></tr>
                <tr><td>紅燈穩定亮起</td><td>熱像儀故障</td></tr>
                <tr><td>綠燈閃爍</td><td>已連接到網路</td></tr>
                <tr><td>無燈號</td><td>未連接至網路</td></tr>
            </table>
        </div>

        <a href="index.html" class="back-btn">⬅️ 回到目錄首頁</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SOP-05 遙控器固定座更換</title>

<style>
    :root {
        --bg-color: #121212;
        --container-bg: #181818;
        --card-bg: #222222;
        --text-main: #ffffff;
        --text-sub: #b0b0b0;
        --accent: #ff4d4d;
        --blue: #3498db;
        --border: #333333;
    }
    body { 
        font-family: "Microsoft JhengHei", sans-serif; 
        background-color: var(--bg-color); 
        color: var(--text-main); 
        margin: 0; padding: 20px; 
        line-height: 1.6;
    }
    .container, .sop-container, body > div.container, body > div:first-of-type { 
        max-width: 850px; margin: auto; 
        background: var(--container-bg); 
        padding: 30px; border-radius: 12px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        border-top: 8px solid var(--accent);
    }
    h1 { color: var(--text-main); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 15px; }
    h2, h3 { color: var(--blue); border-left: 5px solid var(--blue); padding-left: 12px; margin-top: 30px; }
    .info-card { 
        background: var(--card-bg); 
        border: 1px solid var(--border); 
        padding: 20px; border-radius: 8px; margin-bottom: 20px;
    }
    table { width: 100%; border-collapse: collapse; margin: 15px 0; background: #1a1a1a; }
    th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
    th { background-color: #252525; color: var(--blue); }
    td { color: var(--text-sub); }
    .step { 
        background: #1e1e1e; 
        margin-bottom: 12px; padding: 15px;
        border-radius: 6px; border: 1px solid var(--border); 
        border-left: 5px solid var(--blue);
        color: var(--text-sub);
    }
    .step strong { color: var(--text-main); }
    .back-btn { 
        display: inline-block; margin-top: 30px; color: var(--blue); 
        text-decoration: none; font-weight: bold; 
        border: 1px solid var(--blue); padding: 10px 20px; border-radius: 5px;
    }
    img { max-width: 100%; height: auto; border-radius: 8px; margin: 15px 0; border: 1px solid var(--border); }
</style>

</head>
<body>
    <div class="container">
        <h1>SOP-05：遙控器固定座更換</h1>

        <div class="info-card">
            <strong>故障描述：</strong> 遙控器固定座無法與遙控箱結合 / <strong>原因分析：</strong> 鎖固頭損壞<br>
            <table>
                <tr><th>項目</th><th>品名 / 料號</th><th>數量</th></tr>
                <tr><td>一般工具</td><td>六角板手組</td><td>1 組</td></tr>
                <tr><td>零組件</td><td>遙控器座(左/右) (399050074)</td><td>1 個</td></tr>
            </table>
        </div>

        <div class="step-card">
            <strong>1. 關機與拆卸舊底座</strong>
            先將遙控器關機，隨後使用六角板手將損壞的舊底座拆卸下來。
            <span class="tool-info">🔧 工具：六角板手組</span>
            <div class="image-group">
                <div class="image-box"><img src="images/sop05_01.jpg"><p>圖 1：先將遙控器關機</p></div>
                <div class="image-box"><img src="images/sop05_02.jpg"><p>圖 2：拆卸舊底座螺絲</p></div>
            </div>
        </div>

        <div class="step-card">
            <strong>2. 安裝新底座與測試</strong>
            換上新底座並使用六角板手重新鎖緊。完成後嘗試將遙控器與遙控箱結合，測試是否牢固。
            <span class="tool-info">🔧 工具：六角板手組</span>
            <div class="image-group">
                <div class="image-box"><img src="images/sop05_03.jpg"><p>圖 3：更換新底座鎖固</p></div>
                <div class="image-box"><img src="images/sop05_04.jpg"><p>圖 4：結合測試確認牢固</p></div>
            </div>
        </div>

        <a href="index.html" class="back-btn">⬅️ 回到目錄首頁</a>
    </div>
</body>
</html>
